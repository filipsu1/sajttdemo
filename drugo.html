<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Writer Name</title>
    <style>
        body {
            margin: 0;
            padding: 5vh 5vw;
            background: #fcf8e3;
            color: #0a0a0a;
            font-family: 'Times New Roman', serif;
        }

        .container {
            max-width: 1200px; 
            margin: 0 auto;
        }

        /* Intro section */
        .intro { margin-bottom: 5vh; }
        h1 { font-size: 8vw; margin: 0; font-weight: 400; line-height: 0.9; }
        .manifesto { font-size: 3rem; margin: 5vh 0; font-style: italic; max-width: 800px; }

        .hero { margin-bottom: 10vh; }
        .hero img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        .content { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10vw; 
        }

        .work-list { list-style: none; padding: 0; }
        .work-item { margin-bottom: 8vh; }
        .work-title { font-size: 2.5rem; display: block; }
        .work-meta { font-size: 1.2rem; color: #777; margin-top: 10px; }

        .update-list { list-style: none; padding: 0; }
        .update-item { border-top: 1px solid #0a0a0a; padding: 3vh 0; font-size: 1.5rem; }
        .update-date { display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 1vh; }
    </style>
</head>
<body>

    <div class="container">
        <div class="intro">
            <h1>naslov</h1>
            <div class="manifesto">
opis            </div>
        </div>

        <!-- Now uses intrinsic sizing -->
        <div class="hero">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT5q5xaq4mREHN2A2BNFff_aXw5TLfNQ5bz2JtEDE4ZH89TSJ0753Pli2A&s=10" alt="demo slika">
        </div>

        <div class="content">
            <main>
                <ul class="work-list">
                    <li class="work-item">
                        <span class="work-title">naslov dela?</span>
                        <span class="work-meta">podtekst</span>
                    </li>
                </ul>
            </main>

            <aside>
                <ul class="update-list">
                    <li class="update-item">
                        <span class="update-date">19.07.26</span>
tekst                    </li>
                </ul>
            </aside>
        </div>
    </div>

</body>
</html>
