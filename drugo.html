<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Writer Name</title>
    <style>
        body {
            margin: 0;
            background: #f4eee0;
            color: #2a2a2a;
            font-family: 'Times New Roman', Times, serif;
        }

        /* Centered container */
        .page-wrapper {
            max-width: 1100px;
            margin: 0 auto; /* This centers the site */
            display: grid;
            grid-template-columns: 1fr 300px; /* Main content + sidebar */
            border-left: 1px solid #dcd1bc;
            border-right: 1px solid #dcd1bc;
        }

        nav { 
            grid-column: 1 / -1; 
            padding: 40px 60px; 
            border-bottom: 1px solid #dcd1bc;
            display: flex; 
            justify-content: space-between; 
            text-transform: uppercase; 
            font-size: 9px; 
            letter-spacing: 0.3em;
        }

        main { padding: 60px; border-right: 1px solid #dcd1bc; }

        h1 { font-size: 7rem; margin: 0 0 80px 0; font-weight: 400; line-height: 0.8; letter-spacing: -0.05em; }

        .hero-img { margin-bottom: 60px; }
        .hero-img img { width: 100%; display: block; border: 1px solid #dcd1bc; }

        .about-section { 
            margin-bottom: 100px; 
            padding: 40px 0; 
            border-top: 1px solid #dcd1bc; 
            border-bottom: 1px solid #dcd1bc;
            font-style: italic;
            font-size: 1.3rem;
            max-width: 450px;
        }

        .work-item { margin-bottom: 100px; }
        .work-title { font-size: 2.5rem; font-style: italic; margin-bottom: 20px; line-height: 1; }
        .work-thumb { width: 100%; max-width: 300px; height: auto; display: block; border: 1px solid #dcd1bc; margin-bottom: 15px; }
        .work-meta { font-family: sans-serif; font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: #777; }

        aside { 
            background: #efe7d5; 
            padding: 60px; 
            position: sticky; 
            top: 0; 
            height: 100vh; 
            overflow-y: auto;
        }
        .updates-title { font-size: 8px; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 60px; color: #000; }
        .update-item { margin-bottom: 40px; border-bottom: 1px solid #dcd1bc; padding-bottom: 20px; }
        .update-date { display: block; color: #8b4513; margin-bottom: 8px; font-weight: bold; font-family: sans-serif; font-size: 7px; text-transform: uppercase; letter-spacing: 0.1em; }
        .update-text { font-size: 0.9rem; }
    </style>
</head>

</html>
