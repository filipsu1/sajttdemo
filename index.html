<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Writer's Retreat</title>
    <style>
        :root {
            --bg: #f4f1ea;
            --text: #2d5a3a;
            --accent: #3a7a4c;
            --border: #c8c5bc;
        }

        body { margin: 0; padding: 0 20px; background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .container { max-width: 1100px; margin: 0 auto; padding-bottom: 100px; }

        header { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 50px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        h1 { font-size: 8rem; font-weight: 800; margin: 0 0 50px 0; letter-spacing: -0.05em; line-height: 0.9; }
        
        .hero-slider { 
            width: 100%; height: 650px; position: relative; 
            margin-bottom: 80px; display: flex; align-items: center; justify-content: center;
        }
        .slide { 
            position: absolute; width: 100%; height: 100%;
            opacity: 0; transition: opacity 0.7s ease-in-out;
            pointer-events: none; display: flex; align-items: center; justify-content: center;
        }
        .slide.active { opacity: 1; pointer-events: auto; }
        .slide img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.8); border: 1px solid var(--border);
            padding: 20px; cursor: pointer; z-index: 10; transition: 0.3s;
        }
        .btn:hover { background: var(--accent); color: white; }
        .prev { left: -50px; }
        .next { right: -50px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>Radionice</div>
            <div>Eseji</div>
            <div>Poezija</div>
            <a href="#">Kontakt ↗</a>
        </header>

        <h1>Naziv<br>Sajta</h1>

        <div class="hero-slider" id="slider">
            <div class="slide active"><img src="https://i.imgur.com/VDKx2tY.jpeg" alt="Slika 1"></div>
            <div class="slide"><img src="https://i.imgur.com/h8Yv6Jp.jpeg" alt="Slika 2"></div>
            <div class="slide"><img src="https://i.imgur.com/ID2Pew1.jpeg" alt="Slika 3"></div>
            <div class="slide"><img src="https://i.imgur.com/B46NENg.jpeg" alt="Slika 4"></div>
            
            <button class="btn prev" id="prevBtn">❮</button>
            <button class="btn next" id="nextBtn">❯</button>
        </div>
    </div>

    <!-- JS se uvek stavlja ovde, na sam kraj, da bi HTML bio spreman -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.querySelectorAll('.slide');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            let index = 0;
            let autoPlayInterval;

            function showSlide(newIndex) {
                slides[index].classList.remove('active');
                index = (newIndex + slides.length) % slides.length;
                slides[index].classList.add('active');
            }

            function startTimer() {
                autoPlayInterval = setInterval(() => showSlide(index + 1), 7000);
            }

            // Dugmići
            prevBtn.addEventListener('click', () => {
                clearInterval(autoPlayInterval);
                showSlide(index - 1);
                startTimer();
            });

            nextBtn.addEventListener('click', () => {
                clearInterval(autoPlayInterval);
                showSlide(index + 1);
                startTimer();
            });

            // Hover pauza
            const slider = document.getElementById('slider');
            slider.addEventListener('mouseenter', () => clearInterval(autoPlayInterval));
            slider.addEventListener('mouseleave', startTimer);

            // Startuj odmah
            startTimer();
        });
    </script>
</body>
</html>
