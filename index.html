<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Threshold</title>
    <style>
        :root {
            --bg: #fdfaf0;
            --ink: #0a0a0a;
            --accent: #228b22;
        }

        body {
            margin: 0;
            padding: 40px;
            background: var(--bg);
            color: var(--ink);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* Modern, clinical sans */
        }

        /* Layout Grid */
        .container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: baseline; }
        
        /* The Image: Full width, dominant */
        .hero-image {
            width: 100%;
            height: 60vh;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--ink);
            grid-column: 1 / -1;
        }

        /* Modern Typography */
        h1 { font-size: 8rem; margin: 0; letter-spacing: -0.05em; line-height: 0.9; }
        .nav-link { display: block; font-size: 1.2rem; margin-bottom: 10px; text-decoration: none; color: var(--ink); border-bottom: 1px solid transparent; }
        .nav-link:hover { border-bottom: 1px solid var(--ink); }

        .updates { font-family: monospace; font-size: 0.9rem; margin-top: 40px; }
        .update-item { border-top: 1px solid var(--ink); padding: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>THRESHOLD</h1>
            <nav>
                <a href="#" class="nav-link">Poetry/Prose</a>
                <a href="#" class="nav-link">Texts</a>
                <a href="#" class="nav-link">Workshops</a>
                <a href="#" class="nav-link">Contact</a>
            </nav>
        </header>

        <div class="hero-image">
            [High-Resolution Architectural Space]
        </div>

        <main>
            <p style="font-size: 1.5rem; max-width: 600px;">
                A digital laboratory for the preservation of ephemeral subcultures and the documentation of technical entropy.
            </p>
        </main>

        <aside class="updates">
            <strong>UPDATES</strong>
            <div class="update-item">08.07.26 // Archive migration started</div>
            <div class="update-item">07.07.26 // New workshop listing</div>
        </aside>
    </div>

</body>
</html>
