<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>test sajt</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --text: #f4f4f4;
            --accent: #ff3e00;
        }

        body {
            margin: 0;
            padding: 5vh 5vw;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            line-height: 1.4;
        }

        .wrapper { max-width: 1400px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20vh; }
        .name { font-size: 1.2rem; letter-spacing: -0.02em; font-weight: 500; }
        
        nav { display: flex; gap: 40px; }
        .nav-link { 
            color: var(--text); 
            text-decoration: none; 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em;
            transition: color 0.3s;
        }
        .nav-link:hover { color: var(--accent); }

        .hero-layout { display: flex; gap: 10vw; align-items: flex-start; margin-bottom: 20vh; }
        
        .hero-left { width: 50%; }
        .feature-img { width: 100%; margin-bottom: 3vh; }
        .feature-img img { width: 100%; height: auto; display: block; }
        .about-text { font-size: 1rem; color: #aaa; max-width: 400px; }
        
        .hero-text { width: 40%; }
        .hero-text h1 { font-size: 5vw; margin: 0; font-weight: 700; line-height: 0.9; }

        .content-stream { display: flex; justify-content: space-between; gap: 10vw; }
        .work-list { width: 60%; list-style: none; padding: 0; }
        .work-item { padding: 4vh 0; border-top: 1px solid #333; }
        .work-title { font-size: 2.5rem; }

        .updates-col { width: 30%; }
        .updates-title { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            color: #888; 
            margin-bottom: 3vh;
            border-bottom: 1px solid #333;
            padding-bottom: 1vh;
        }
        .update-item { margin-bottom: 3vh; font-size: 0.9rem; }
        .update-date { color: var(--accent); display: block; font-weight: bold; margin-bottom: 0.5vh; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="name">WRITER_NAME / 2026</div>
            <nav>
                <a href="#" class="nav-link">poezija</a>
                <a href="#" class="nav-link">proza</a>
                <a href="#" class="nav-link">kontakt</a>
            </nav>
        </header>

        <section class="hero-layout">
            <div class="hero-left">
                <div class="feature-img">
                    <img src="https://images.unsplash.com/photo-1599009434802-ca1dd09895e7?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cGxhY2Vob2xkZXJ8ZW58MHx8MHx8fDA%3D" alt="placeholder">
                </div>
                <div class="about-text">
nešto o meni                </div>
            </div>
            <div class="hero-text">
                <h1>placeholder text.</h1>
            </div>
        </section>

        <section class="content-stream">
            <main class="work-list">
                <div class="work-item">
                    <div class="work-title">RAD I</div>
                    <p>2026</p>
                </div>
                <div class="work-item">
                    <div class="work-title">RAD II</div>
                    <p> 2026</p>
                </div>
            </main>

            <aside class="updates-col">
                <div class="updates-title">novosti</div>
                <div class="update-item">
                    <span class="update-date">08.07.26</span>
tekst o novostima                </div>
                <div class="update-item">
                    <span class="update-date">07.01.26</span>
tekst o novostima                </div>
            </aside>
        </section>
    </div>

</body>
</html>
